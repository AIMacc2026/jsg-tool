<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JSG Trainings-App</title>

  <!-- Cache-Busting: Version hier manuell erhöhen bei Deploy (z.B. v=2, v=3) -->
  <link rel="stylesheet" href="./style.css?v=2" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
  <script src="./app.js?v=2" defer></script>
</head>

<body>
  <div class="container">

    <header class="header">
      <div class="brand">
        <div class="logo">JSG</div>
        <div>
          <div class="title">Trainings-App</div>
          <div class="subtitle">Eintragen</div>
        </div>
      </div>

      <div class="userbox">
        <button id="entryViewBtn" class="btn btn-ghost hidden" type="button">Eintragen</button>
        <button id="resultsViewBtn" class="btn btn-ghost hidden" type="button">Ergebnisse</button>
        <span id="userLabel" class="muted">Nicht angemeldet</span>
        <button id="logoutBtn" class="btn btn-ghost hidden" type="button">Abmelden</button>
      </div>
    </header>

    <!-- AUTH -->
    <section id="authSection" class="card">
      <h2>Anmelden</h2>

      <div class="grid">
        <label>
          E-Mail
          <input id="email" type="email" autocomplete="email" placeholder="name@mail.de" />
        </label>

        <label>
          Passwort
          <div class="pwWrap">
            <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
            <button id="pwToggle" type="button" class="btn btn-ghost pwToggle">👁</button>
          </div>
        </label>

        <label>
          Invite-Code
          <input id="inviteCode" type="text" placeholder="z.B. JSG-2026" />
        </label>
      </div>

      <div class="row">
        <button id="loginBtn" class="btn" type="button">Anmelden</button>
        <button id="signupBtn" class="btn btn-ghost" type="button">Registrieren</button>
      </div>

      <div id="authMsg" class="msg"></div>
    </section>

    <!-- ENTRY -->
    <section id="appSection" class="card hidden">
      <h2>Eintrag</h2>

      <div class="grid">
        <label>
          Datum
          <input id="datum" type="date" />
        </label>

        <label>
          Team
          <select id="teamSelect"></select>
        </label>

        <label>
          Spieler
          <select id="playerSelect"></select>
        </label>

        <label>
          Trainingstyp
          <select id="typSelect"></select>
        </label>
      </div>

      <div class="grid grid-2">
        <label class="inline">
          <span>Anwesenheit</span>
          <div class="seg">
            <button type="button" class="segbtn" id="attJa">Ja</button>
            <button type="button" class="segbtn" id="attNein">Nein</button>
          </div>
        </label>

        <label class="inline">
          <span>Abgemeldet</span>
          <div class="seg">
            <button type="button" class="segbtn" id="excJa">Ja</button>
            <button type="button" class="segbtn" id="excNein">Nein</button>
          </div>
        </label>

        <label id="grundWrap" class="hidden">
          Grund
          <select id="grundSelect"></select>
        </label>
      </div>

      <div class="grid grid-2">
        <label>
          Auffälligkeit
          <select id="flagSelect">
            <option value="none">Keine</option>
            <option value="positive">Positiv</option>
            <option value="negative">Negativ</option>
          </select>
        </label>

        <label id="katWrap" class="hidden">
          Kategorie
          <select id="katSelect"></select>
        </label>

        <label id="sevWrap" class="hidden">
          Schweregrad (1–5)
          <select id="sevSelect">
            <option value="">–</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          </select>
        </label>

        <label id="notizWrap" class="hidden">
          Notiz (max. 10 Wörter)
          <input id="notiz" type="text" placeholder="optional" />
        </label>
      </div>

      <div class="grid grid-2">
        <label>
          Readiness (optional)
          <select id="readySelect">
            <option value="">–</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          </select>
        </label>

        <label>
          Readiness-Grund (max. 10 Wörter)
          <input id="readyGrund" type="text" placeholder="optional" />
        </label>
      </div>

      <div class="row">
        <button id="saveBtn" class="btn" type="button">Speichern</button>
        <button id="nextBtn" class="btn btn-ghost" type="button">Nächster Spieler</button>
      </div>

      <div id="saveMsg" class="msg"></div>
    </section>

    <!-- RESULTS -->
    <section id="resultsSection" class="card hidden">
      <h2>Ergebnisse</h2>

      <div class="grid">
        <label>
          Team
          <select id="resTeamSelect"></select>
        </label>

        <label>
          Spieler (optional)
          <select id="resPlayerSelect"></select>
        </label>

        <label>
          Zeitraum
          <select id="rangeSelect">
            <option value="1">Letzter Monat</option>
            <option value="3">Letzte 3 Monate</option>
            <option value="6" selected>Letzte 6 Monate</option>
            <option value="12">Letzte 12 Monate</option>
          </select>
        </label>
      </div>

      <div class="row">
        <button id="resLoadBtn" class="btn" type="button">Aktualisieren</button>
      </div>

      <div id="resultsSummary" class="msg"></div>

      <div class="grid grid-2 resultsGrid">
        <div class="card resultsCard">
          <div class="muted resultsTitle">Anwesenheit / Fehlend (pro Tag)</div>
          <canvas id="chartAttendance" width="600" height="220" style="width:100%;height:auto;"></canvas>
        </div>

        <div class="card resultsCard">
          <div class="muted resultsTitle">Positiv / Negativ (pro Tag)</div>
          <canvas id="chartFlags" width="600" height="220" style="width:100%;height:auto;"></canvas>
        </div>
      </div>

      <div class="card resultsCard" style="margin-top:14px;">
        <div class="muted resultsTitle">Gründe (Abwesenheit)</div>
        <div id="reasonsList" class="msg"></div>
      </div>
    </section>

  </div>
</body>
</html>
